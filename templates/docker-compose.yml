services:
  db:
    image: mariadb:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db:/var/lib/mysql

  wordpress:
    # Built from the stock wordpress image + a uid-1000 user so Apache can drop
    # privileges to APACHE_RUN_USER=#1000 (see wordpress.Dockerfile) — keeps
    # PHP-written files owned by 1000, editable from the workspace.
    build:
      context: .
      dockerfile: wordpress.Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MARIADB_DATABASE}
      WORDPRESS_DB_USER: ${MARIADB_USER}
      WORDPRESS_DB_PASSWORD: ${MARIADB_PASSWORD}
      # Marks the site as local so e.g. Application Passwords work over plain HTTP.
      WP_ENVIRONMENT_TYPE: local
      # Run Apache (and chown the WordPress files) as uid/gid 1000 — the same
      # user the workspace container runs as (node). On Linux, bind mounts keep
      # the container's uid on the host, so without this the wordpress container
      # would write wp-content/.htaccess as www-data (uid 33), and neither the
      # workspace container (WP-CLI, plugin installs) nor your host user could
      # write into the tree. Anchoring everything to 1000 keeps it writable from
      # all three. (Docker Desktop on macOS papers over this; native Linux doesn't.)
      APACHE_RUN_USER: "#1000"
      APACHE_RUN_GROUP: "#1000"
      # Derive the site URL from the request host so the site works without
      # redirects both from your machine (localhost:${WP_PORT}) and from inside
      # the Docker network (http://wordpress — used by the Playwright browser).
      # ($$ is escaped to a literal $ for the generated wp-config.php.)
      WORDPRESS_CONFIG_EXTRA: |
        if ( ! empty( $$_SERVER['HTTP_HOST'] ) ) {
            $$scheme = ( ! empty( $$_SERVER['HTTPS'] ) && $$_SERVER['HTTPS'] !== 'off' ) ? 'https' : 'http';
            define( 'WP_HOME', $$scheme . '://' . $$_SERVER['HTTP_HOST'] );
            define( 'WP_SITEURL', $$scheme . '://' . $$_SERVER['HTTP_HOST'] );
        }
        // Use direct PHP filesystem access — no FTP-credentials prompt. WordPress
        // otherwise guesses the method by comparing file ownership against the web
        // server's uid; in this sandbox that heuristic can pick a non-'direct'
        // method, so WP_Filesystem fails to init and plugins that read/write files
        // through it (e.g. a fonts.json reader) fatal. Safe here: throwaway local
        // sandbox, and the web container can read/write the bind-mounted tree.
        define( 'FS_METHOD', 'direct' );
    ports:
      - "${WP_PORT}:80"
    volumes:
      - ./workspace/wp:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/php.ini:ro   # custom PHP overrides (upload limits, etc.)
      # Mount the workspace root at the same path the workspace container uses, so
      # a plugin/theme you check out there and symlink into wp-content resolves
      # here too (Apache follows the symlink to /home/node/<your-checkout>).
      - ./workspace:/home/node

  # Isolated dev container: Node + Claude Code + Cursor CLI + PHP + WP-CLI +
  # Composer. This is where you run agents (Claude via `npm run claude`, Cursor
  # via `npm run cursor`). You land in the workspace root (/home/node) with
  # WordPress nested at ./wp — so you can check out plugins/themes as siblings of
  # wp and symlink them into wp/wp-content/. It reaches the site over the Docker
  # network (http://wordpress) and the DB at host "db".
  workspace:
    build:
      context: .
      dockerfile: workspace.Dockerfile
    # Come back up after a host reboot like the rest of the stack. Also required
    # for the dev container, which joins this container's network namespace
    # (see docker-compose.override.yml): its own `unless-stopped` restart fails
    # if its netns owner isn't running.
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MARIADB_DATABASE}
      WORDPRESS_DB_USER: ${MARIADB_USER}
      WORDPRESS_DB_PASSWORD: ${MARIADB_PASSWORD}
      # So WP-CLI run here agrees with the wordpress container's environment type.
      WP_ENVIRONMENT_TYPE: local
      # Tell Claude Code this really is a sandbox, so --dangerously-skip-permissions
      # doesn't print its acceptance warning. Set on the container, so it's also
      # inherited by `docker compose exec` (how `npm run claude` reaches Claude).
      IS_SANDBOX: "1"
__APP_PORTS__
    volumes:
      # Workspace root + home: persists your Claude login, shell history, your
      # plugin/theme checkouts, and WordPress itself (nested at ./wp inside it).
      - ./workspace:/home/node

  # Playwright MCP server (prebaked image, headless Chromium). Claude in the
  # workspace connects to it over HTTP at http://playwright:8931/mcp and drives a
  # browser against the site at http://wordpress. --allowed-hosts must list the
  # host:port Claude uses (the server otherwise only accepts localhost).
  #
  # --output-dir writes screenshots/traces into /home/node/.playwright-output.
  # Because the workspace is bind-mounted here at the SAME path it has in the
  # workspace container (below), a screenshot Playwright saves is readable by the
  # agent at the exact path the tool reports — so it can Read the image back and
  # actually look at it. Without this, files land only inside this container and
  # the agent can't see them. The image runs as uid 1000 (node), matching the
  # workspace's owner, so writes succeed.
  playwright:
    image: mcr.microsoft.com/playwright/mcp:latest
    restart: unless-stopped
    init: true
    command: ["--port", "8931", "--host", "0.0.0.0", "--allowed-hosts", "playwright:8931", "--output-dir", "/home/node/.playwright-output"]
    volumes:
      - ./workspace:/home/node
